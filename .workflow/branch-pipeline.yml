version: '1.0'
name: flutter-build
displayName: Flutter APK 构建
triggers:
  push:
    branches:
      include:
        - main
        - master

stages:
  - stage:
    name: build_apk
    displayName: 构建 APK
    steps:
      - step: build@shell
        name: flutter_build
        displayName: Flutter Release 构建
        commands:
          # 安装依赖
          - apt-get update -qq && apt-get install -y -qq curl unzip git xz-utils openjdk-17-jdk
          # 安装 Flutter
          - git clone --depth 1 --branch stable https://gitee.com/mirrors/Flutter.git /opt/flutter
          - export PATH="/opt/flutter/bin:/opt/flutter/bin/cache/dart-sdk/bin:$PATH"
          - export FLUTTER_STORAGE_BASE_URL=https://storage.flutter-io.cn
          - export PUB_HOSTED_URL=https://pub.flutter-io.cn
          - flutter precache --android
          - flutter doctor -v
          # 安装 Android SDK
          - mkdir -p /opt/android-sdk/cmdline-tools
          - cd /opt/android-sdk/cmdline-tools
          - curl -sL https://mirrors.cloud.tencent.com/AndroidSDK/commandlinetools-linux-11076708_latest.zip -o cmdtools.zip
          - unzip -q cmdtools.zip && mv cmdline-tools latest
          - export ANDROID_HOME=/opt/android-sdk
          - export ANDROID_SDK_ROOT=/opt/android-sdk
          - export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          - yes | sdkmanager --licenses > /dev/null 2>&1
          - sdkmanager "platforms;android-34" "build-tools;34.0.0"
          # 获取依赖并构建
          - cd $GITEE_WORKSPACE
          - flutter pub get
          - flutter build apk --release
        # 保存构建产物
        artifacts:
          - name: apk
            path:
              - build/app/outputs/flutter-apk/app-release.apk

      - step: publish@general_artifacts
        name: upload_apk
        displayName: 上传 APK
        dependArtifact: apk
        artifactName: luo_xue_next_apk
        dependsOn: flutter_build
